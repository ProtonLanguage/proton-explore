<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore — Proton#</title>
  <meta http-equiv="refresh" content="3;url=https://protonsharp.com/explore/"/>
  <link rel="icon" type="image/png" href="proton-logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Syne:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0a;color:#f0f0f0;font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{text-align:center;padding:40px 20px;}
    .icon{font-size:3rem;margin-bottom:20px;}
    h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
    h1 span{color:#FF6B00;}
    p{color:#999;font-size:0.95rem;margin-bottom:28px;line-height:1.6;}
    .btn{display:inline-block;background:#FF6B00;color:#fff;padding:13px 32px;border-radius:10px;font-weight:700;text-decoration:none;font-size:0.95rem;transition:all 0.2s;}
    .btn:hover{background:#ff8c38;transform:translateY(-2px);}
    .note{margin-top:16px;font-size:0.75rem;color:#555;font-family:'JetBrains Mono',monospace;}
    .bar{width:200px;height:3px;background:#1e1e1e;border-radius:10px;margin:24px auto 0;overflow:hidden;}
    .bar-fill{height:100%;background:#FF6B00;border-radius:10px;animation:fill 3s linear forwards;}
    @keyframes fill{from{width:0%}to{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🎮</div>
    <h1>Explore <span>Proton#</span></h1>
    <p>The Explore page lives at protonsharp.com.<br/>You'll be redirected automatically.</p>
    <a href="https://protonsharp.com/explore/" class="btn">Go to Explore →</a>
    <div class="bar"><div class="bar-fill"></div></div>
    <div class="note">redirecting in 3 seconds...</div>
  </div>
  <script>setTimeout(function(){window.location.href='https://protonsharp.com/explore/';},3000);</script>
</body>
</html>
